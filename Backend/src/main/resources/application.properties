spring.application.name=YouTube Subtitle Learning Tool

# Gemini API Key - set this via environment variable GEMINI_API_KEY or replace here
gemini.api-key=${GEMINI_API_KEY:AQ.Ab8RN6Kc_mlyHM7IojljxizRWcXe3YatVnA9meERi3hLM1uPPQ}
gemini.model-name=gemini-flash-latest

# CORS allowed origins (Vue dev server)
cors.allowed-origins=http://localhost:5173,http://localhost:3000

# Server Configuration
server.port=8085

# MySQL Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3307/sublearn?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Logging
logging.level.personal_project=DEBUG
