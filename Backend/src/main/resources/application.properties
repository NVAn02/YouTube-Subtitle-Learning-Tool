spring.application.name=YouTube Subtitle Learning Tool

# Gemini API Key - set this via environment variable GEMINI_API_KEY or replace here
gemini.api-key=${GEMINI_API_KEY:AQ.Ab8RN6Kc_mlyHM7IojljxizRWcXe3YatVnA9meERi3hLM1uPPQ}
gemini.model-name=gemini-flash-latest

# CORS allowed origins - override via CORS_ALLOWED_ORIGINS env var in production
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000,http://168.138.195.138:8082}

# Server Configuration
server.port=8085

# MySQL Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3307/sublearn?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# yt-dlp Proxy (set via YTDLP_PROXY_URL env var in production)
# Format: socks5://user:pass@host:port or http://user:pass@host:port
ytdlp.proxy-url=${YTDLP_PROXY_URL:}

# Logging
logging.level.personal_project=DEBUG
